spring.freemarker.template-loader-path=classpath:/templates/
spring.freemarker.suffix=.ftl
# Multipart file upload limits: 7GB for both max file size and max request size
spring.servlet.multipart.max-file-size=7GB
spring.servlet.multipart.max-request-size=7GB

# Large file upload configuration for admin users (7GB = 7516192768 bytes)
app.upload.large-file-max-size=7516192768

# Disable DataSource auto-configuration (not needed for SRT translation app)
spring.sql.init.mode=never

# Local file storage configuration
local-storage-path=${user.home}/tasos-storage

# Translation provider configuration: deepl or azure
srt.translation.provider=${SRT_TRANSLATION_PROVIDER:deepl}

# DeepL Translation API Configuration
# Get your API key from https://www.deepl.com/pro-api
deepl.api.key=${DEEPL_API_KEY:}

# Azure Translator API Configuration
# Endpoint example: https://api.cognitive.microsofttranslator.com
azure.translator.endpoint=${AZURE_TRANSLATOR_ENDPOINT:https://api.cognitive.microsofttranslator.com}
azure.translator.key=${AZURE_TRANSLATOR_KEY:}
# Region is required for regional resources (for example: westeurope)
azure.translator.region=${AZURE_TRANSLATOR_REGION:}

server.forward-headers-strategy=native

# Security
app.security.username=admin77
app.security.password=${APP_SECURITY_PASSWORD:password737}
