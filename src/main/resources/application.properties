spring.freemarker.template-loader-path=classpath:/templates/
spring.freemarker.suffix=.ftl
# Multipart file upload limits: 7GB for both max file size and max request size
spring.servlet.multipart.max-file-size=7GB
spring.servlet.multipart.max-request-size=7GB

# Large file upload configuration for admin users (7GB = 7516192768 bytes)
app.upload.large-file-max-size=7516192768

# Disable DataSource auto-configuration (not needed for SRT translation app)
spring.sql.init.mode=never

# Local file storage configuration
local-storage-path=${user.home}/tasos-storage

# Translation provider configuration: deepl or azure
srt.translation.provider=${SRT_TRANSLATION_PROVIDER:deepl}

# DeepL Translation API Configuration
# Get your API key from https://www.deepl.com/pro-api
deepl.api.key=${DEEPL_API_KEY:}

# Azure Translator API Configuration
# Endpoint example: https://api.cognitive.microsofttranslator.com
azure.translator.endpoint=${AZURE_TRANSLATOR_ENDPOINT:https://api.cognitive.microsofttranslator.com}
azure.translator.key=${AZURE_TRANSLATOR_KEY:}
# Region is required for regional resources (for example: westeurope)
azure.translator.region=${AZURE_TRANSLATOR_REGION:}

# Trust reverse proxies (Nginx) to accurately provide client IP via X-Forwarded-For
server.forward-headers-strategy=framework
server.tomcat.remoteip.remote-ip-header=x-forwarded-for
server.tomcat.remoteip.protocol-header=x-forwarded-proto
#Where Nginx runs
server.tomcat.remoteip.internal-proxies=127\\.0\\.0\\.1

# Security
app.security.username=admin77
app.security.password=${APP_SECURITY_PASSWORD:password737}

# OpenSearch Integration
opensearch.enabled=${OPENSEARCH_ENABLED:true}
opensearch.host=${OPENSEARCH_HOST:127.0.0.1}
opensearch.port=${OPENSEARCH_PORT:9200}
opensearch.scheme=${OPENSEARCH_SCHEME:https}
opensearch.username=${OPENSEARCH_USERNAME:admin}
opensearch.password=${OPENSEARCH_PASSWORD:admin}

# Enable Access Logs.
server.tomcat.accesslog.enabled=true
server.tomcat.accesslog.directory=${user.home}/demoProjectLogs
server.tomcat.accesslog.prefix=access_log
server.tomcat.accesslog.suffix=.log
server.tomcat.accesslog.request-attributes-enabled=true
server.tomcat.accesslog.pattern=%a %l %u %t "%r" %s %b %D "%{Referer}i" "%{User-Agent}i"

# Audit Contact Box Recipient / Bcc
app.email.audit.email=${AUDIT_EMAIL:}

# System Sender Email for Internal Notifications
app.email.system.sender=${SYSTEM_SENDER_EMAIL:}

# Email Configuration
spring.mail.host=${SMTP_HOST:test0101.oci.oraclecloud.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
